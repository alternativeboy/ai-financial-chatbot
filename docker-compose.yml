services:
  postgres:
    image: postgres:16-alpine
    container_name: financial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-financial_db}
      # Read by 03-llm-reader.sh, not by Postgres itself. No default for the
      # password: booting with a guessable credential on the SELECT-only role
      # would quietly weaken the guardrail, so fail instead.
      LLM_READER_USER: ${LLM_READER_USER:-llm_reader}
      LLM_READER_PASSWORD: ${LLM_READER_PASSWORD:?set LLM_READER_PASSWORD in .env}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts run in filename order, and only when the data volume is
      # empty. To re-run them after editing: docker compose down -v
      #   01 creates financial_data and COPYs the 192 rows
      #   02 indexes it
      #   03 creates the SELECT-only role the LLM's SQL runs as
      - ./data/financial_data.sql:/docker-entrypoint-initdb.d/01-financial-data.sql:ro
      - ./docker/postgres/02-indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql:ro
      - ./docker/postgres/03-llm-reader.sh:/docker-entrypoint-initdb.d/03-llm-reader.sh:ro
    healthcheck:
      # Postgres briefly accepts connections during init before the scripts have
      # run. Gate on the row count instead, so dependents only start once the
      # data is actually loaded.
      test:
        - CMD-SHELL
        - >-
          psql -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -tAc
          'SELECT count(*) FROM financial_data' | grep -qx 192
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres_data:
